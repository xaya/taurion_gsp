syntax = "proto2";
option cc_enable_arenas = true;

package pxd.proto;

/**
 * General data associated to an account.
 */
message Account
{

  /**
   * The number of characters killed by the account in total.
   */
  optional uint32 kills = 1;

  /**
   * The fame of this account.
   */
  optional uint32 fame = 2;

  /**
   * Balance of vCHI for this account.
   */
  optional uint64 balance = 3;

  /**
   * Balance of vCHI minted through the burnsale, which corresponds to
   * the balance that will be carried over to the full game.
   */
  optional uint64 burnsale_balance = 4;

  /**
   * Jobs-board completion counters.  Bumped by the jobs subsystem on a
   * successful settle (completed count + value), but consumed by NO consensus
   * rule: they are vetting signals surfaced to clients.  Raw counts are
   * fee-priced and inflatable by colluding pairs; the value-weighted counter
   * is the fee-backed face-value signal (inflating it burns the ~1% posting
   * fee on the credited value, so it anchors to burned cost rather than
   * proving arm's-length work), and wraps at the field widths are
   * deterministic and explicitly accepted (see BumpJobStats).  This is
   * O(1) reputation state; bounded consensus job history records what
   * settled and why, and an indexer may retain richer history off-chain.
   */
  optional uint32 jobs_completed = 5;
  reserved 6;  // was jobs_failed (no kept type produces a worker forfeit)
  optional uint64 jobs_value_completed = 7;

  reserved 8;  // was jobs_failed_as_poster (removed with the delivery types)

  /**
   * Escrow-DEAL reputation counters, kept DISJOINT from the jobs/wanted
   * counters above: a wanted self-kill drain must never inflate a signal the
   * escrow directory reads (red-team T7).  Bumped for the worker on ANY
   * tax-bearing settlement with p>0 -- which INCLUDES a ghosted 50/50 split
   * and a partial (low-p) ruling, not only a clean release.  A Phase-2
   * reputation layer must therefore read "completed" as "settled with the
   * worker earning something", never as "delivered in full".  The value
   * counter scales with the earned reward share (reward * p / 100), so a
   * half-split or a p=10 ruling credits proportionally less than a p=100
   * release.  Value-gated, so micro/zero deals grant nothing; a disputed
   * loser is deliberately NOT marked failed (a contested arbiter judgement is
   * not chain-verified fault).  Same width/wrap semantics and display-only
   * status as the jobs counters.
   */
  optional uint32 deals_completed = 9;
  optional uint64 deals_value_completed = 10;

}

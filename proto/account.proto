syntax = "proto2";
option cc_enable_arenas = true;

package pxd.proto;

/**
 * General data associated to an account.
 */
message Account
{

  /**
   * The number of characters killed by the account in total.
   */
  optional uint32 kills = 1;

  /**
   * The fame of this account.
   */
  optional uint32 fame = 2;

  /**
   * Balance of vCHI for this account.
   */
  optional uint64 balance = 3;

  /**
   * Balance of vCHI minted through the burnsale, which corresponds to
   * the balance that will be carried over to the full game.
   */
  optional uint64 burnsale_balance = 4;

  /**
   * Jobs-board completion counters.  Bumped by the jobs subsystem at
   * settlement (completed / value on a successful settle, failed when the
   * worker is held responsible), but consumed by NO consensus rule: they
   * are vetting signals surfaced to clients.  Raw counts are fee-priced
   * and inflatable by colluding pairs; the value-weighted counter is the
   * fee-backed face-value signal (inflating it burns the ~1% posting fee
   * on the credited value, so it anchors to burned cost rather than
   * proving arm's-length work), and wraps at the field widths are
   * deterministic and explicitly accepted (see BumpJobStats).  This is
   * O(1) reputation state; bounded consensus job history records what
   * settled and why, and
   * an indexer may retain richer or permanent history off-chain.
   */
  optional uint32 jobs_completed = 5;
  optional uint32 jobs_failed = 6;
  optional uint64 jobs_value_completed = 7;

  /**
   * Jobs that ended in a worker forfeit under this account's posts.  A
   * poster can force those forfeits at will (e.g. by suiciding their own
   * protected asset to harvest the collateral), so this is the scam-vetting
   * signal: a clean worker record plus a high forfeit-as-poster count marks
   * an account workers should not post bonds with.
   */
  optional uint32 jobs_failed_as_poster = 8;

}
